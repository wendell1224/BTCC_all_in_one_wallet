name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Node dependencies
        run: npm ci --cache .npm-cache

      - name: Build Electron assets
        run: ./scripts/build_electron.sh

      - name: Read version
        id: ver
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/electron/BTCC Wallet-${{ steps.ver.outputs.version }}-arm64.dmg
          body_path: docs/releases/v${{ steps.ver.outputs.version }}.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
